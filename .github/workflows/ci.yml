name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

  test-ml:
    runs-on: ubuntu-latest
    name: Test with ML deps
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install all dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,ml]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

  test-postgres-pii-e2e:
    runs-on: ubuntu-latest
    name: Postgres MCP PII e2e
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Postgres
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql postgresql-client

      - name: Cache e2e Python environment
        id: cache-e2e-venv
        uses: actions/cache@v4
        with:
          path: .venv-e2e
          key: postgres-pii-e2e-${{ runner.os }}-py312-${{ hashFiles('pyproject.toml', '.github/workflows/ci.yml') }}

      - name: Cache package downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/uv
            ~/.cache/python-tldextract
          key: postgres-pii-e2e-downloads-${{ runner.os }}-py312-${{ hashFiles('pyproject.toml', '.github/workflows/ci.yml') }}
          restore-keys: |
            postgres-pii-e2e-downloads-${{ runner.os }}-py312-

      - name: Install e2e dependencies
        if: steps.cache-e2e-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv-e2e
          . .venv-e2e/bin/activate
          python -m pip install --upgrade pip
          pip install -e ".[dev,pii]"
          pip install uv
          python -m spacy download en_core_web_lg

      - name: Verify cached NLP model
        run: |
          . .venv-e2e/bin/activate
          python -c "import en_core_web_lg; en_core_web_lg.load(); print('en_core_web_lg ready')"

      - name: Run Postgres MCP PII e2e
        env:
          RUN_POSTGRES_MCP_E2E: "1"
        run: |
          . .venv-e2e/bin/activate
          pytest tests/test_postgres_pii_e2e.py -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install "ruff>=0.4"

      - name: Lint
        run: ruff check spine/ tests/

  publish:
    runs-on: ubuntu-latest
    needs: [test, test-ml, test-postgres-pii-e2e, lint]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
