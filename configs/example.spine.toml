# ============================================================
# MCP Spine — Example Configuration
# ============================================================
# A real-world config for a full-stack project with multiple
# MCP servers proxied through a single security layer.
#
# Copy this file, rename to spine.toml, and customize.
# All paths use forward slashes — works on Windows and Linux.

[spine]
log_level = "info"                  # debug | info | warn | error
audit_db = "spine_audit.db"         # SQLite audit trail (use absolute path on Windows)

# ── Downstream MCP Servers ──────────────────────────────────
# All servers start concurrently. The Spine responds to Claude
# as soon as ANY server is ready — slow servers appear later
# via a tools/listChanged notification.

[[servers]]
name = "filesystem"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "/path/to/project"]
timeout_seconds = 120

[[servers]]
name = "github"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-github"]
env = { GITHUB_TOKEN = "ghp_your_token_here" }
timeout_seconds = 180               # npx first-run is slow; cached after that

[[servers]]
name = "sqlite"
command = "uvx"                     # or use a Python wrapper script
args = ["mcp-server-sqlite", "--db-path", "/path/to/database.db"]
timeout_seconds = 60

[[servers]]
name = "memory"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-memory"]
timeout_seconds = 60

# ── Semantic Routing (Stage 2) ──────────────────────────────
# Routes only the most relevant tools to the LLM per request.
# Requires: pip install mcp-spine[ml]
# Loads in background — tools work immediately, routing
# activates when the model finishes loading.

[routing]
max_tools = 15                      # 0 = show all tools (no routing)
always_include = ["spine_set_context", "read_file", "write_file"]
embedding_model = "all-MiniLM-L6-v2"
rerank = true                       # keyword overlap + recency boost
similarity_threshold = 0.25

# ── Schema Minification (Stage 3) ───────────────────────────
# Strips unnecessary fields from tool schemas to save tokens.
# Level 0 = off, 1 = light, 2 = standard (61% savings), 3 = aggressive

[minifier]
level = 2
max_description_length = 100        # truncate long descriptions
preserve_required = true

# ── State Guard (Stage 4) ───────────────────────────────────
# Watches project files and injects SHA-256 version pins into
# tool responses. Prevents LLMs from editing stale file versions.

[state_guard]
enabled = true
watch_paths = ["/path/to/project/src", "/path/to/project/tests"]
max_tracked_files = 100
max_pin_files = 15
snippet_length = 150
ignore_patterns = [
    "**/.git/**",
    "**/node_modules/**",
    "**/__pycache__/**",
    "**/.venv/**",
    "**/dist/**",
    "**/build/**",
    "**/*.pyc",
    "**/.DS_Store",
    "**/spine_audit.db",
    "**/.spine/**",
    "**/package-lock.json",
    "**/yarn.lock",
]

# ── Security ────────────────────────────────────────────────

[security]
scrub_secrets_in_logs = true        # scrub AWS keys, tokens, etc. from logs
scrub_secrets_in_responses = false  # opt-in: may break tool output
audit_all_tool_calls = true         # full audit trail in SQLite
global_rate_limit = 120             # calls/minute across all tools
per_tool_rate_limit = 60            # calls/minute per individual tool

[security.path]
allowed_roots = ["/path/to/project"]
denied_patterns = [
    "**/.env",
    "**/.env.*",
    "**/secrets.*",
    "**/*.pem",
    "**/*.key",
    "**/id_rsa*",
    "**/.ssh/*",
    "**/.aws/*",
    "**/.gnupg/*",
    "**/credentials.json",
]

# ── Tool Policies ──────────────────────────────────────────
# Per-tool security rules using glob patterns.
# Actions: "allow" (default), "deny" (block), "audit" (allow + warn)

# Require human confirmation for destructive file operations
[[security.tools]]
pattern = "write_file"
action = "allow"
require_confirmation = true

[[security.tools]]
pattern = "edit_file"
action = "allow"
require_confirmation = true

[[security.tools]]
pattern = "create_directory"
action = "allow"
require_confirmation = true

[[security.tools]]
pattern = "move_file"
action = "allow"
require_confirmation = true

# Require confirmation for destructive GitHub operations
[[security.tools]]
pattern = "push_files"
action = "allow"
require_confirmation = true

[[security.tools]]
pattern = "merge_pull_request"
action = "allow"
require_confirmation = true

# Require confirmation for database writes
[[security.tools]]
pattern = "write_query"
action = "allow"
require_confirmation = true

# Audit all database reads
[[security.tools]]
pattern = "read_query"
action = "audit"
rate_limit = 30

# Block any tool matching "execute_command"
[[security.tools]]
pattern = "execute_*"
action = "deny"
